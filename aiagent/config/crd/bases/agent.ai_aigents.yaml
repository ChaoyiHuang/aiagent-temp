apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: aigents.agent.ai
spec:
  group: agent.ai
  names:
    kind: AIAgent
    listKind: AIAgentList
    plural: aigents
    singular: aigent
    shortNames:
    - agent
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - runtimeRef
            properties:
              runtimeRef:
                type: object
                properties:
                  type:
                    type: string
                    # No enum restriction - supports any framework type
                  name:
                    type: string
              harnessOverride:
                type: object
                properties:
                  model:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        allowedModels:
                          type: array
                          items:
                            type: string
                        deniedModels:
                          type: array
                          items:
                            type: string
                        deny:
                          type: boolean
                  mcp:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        allowedServers:
                          type: array
                          items:
                            type: string
                        deniedServers:
                          type: array
                          items:
                            type: string
                        deny:
                          type: boolean
                  memory:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        config:
                          type: object
                  sandbox:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        deny:
                          type: boolean
                  skills:
                    type: array
                    items:
                      type: object
                      required:
                      - name
                      properties:
                        name:
                          type: string
                        allowedSkills:
                          type: array
                          items:
                            type: string
                        deniedSkills:
                          type: array
                          items:
                            type: string
              agentConfigReferences:
                type: array
                items:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                    configMapRef:
                      type: object
                      properties:
                        name:
                          type: string
                    secretRef:
                      type: object
                      properties:
                        name:
                          type: string
              agentConfig:
                type: object
                description: "Framework-specific configuration in JSON format. The Handler determines the schema and meaning of this configuration."
                x-kubernetes-preserve-unknown-fields: true
              volumePolicy:
                type: string
                enum:
                - retain
                - delete
                default: retain
              description:
                type: string
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Scheduling
                - Running
                - Migrating
                - Failed
                - Terminated
              runtimeRef:
                type: object
                properties:
                  name:
                    type: string
                  uid:
                    type: string
              agentID:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - type
                  - status
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
    subresources:
      status: {}