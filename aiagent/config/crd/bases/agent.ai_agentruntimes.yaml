apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: agentruntimes.agent.ai
spec:
  group: agent.ai
  names:
    kind: AgentRuntime
    listKind: AgentRuntimeList
    plural: agentruntimes
    singular: agentruntime
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - agentHandler
            - agentFramework
            properties:
              agentHandler:
                type: object
                required:
                - image
                properties:
                  image:
                    type: string
                  version:
                    type: string
                  imagePullPolicy:
                    type: string
                    enum:
                    - Always
                    - Never
                    - IfNotPresent
                  env:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          type: object
                          properties:
                            secretKeyRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                            configMapKeyRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                            fieldRef:
                              type: object
                              properties:
                                fieldPath:
                                  type: string
                  args:
                    type: array
                    items:
                      type: string
                  command:
                    type: array
                    items:
                      type: string
                  volumeMounts:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        mountPath:
                          type: string
                        subPath:
                          type: string
              agentFramework:
                type: object
                required:
                - image
                - type
                properties:
                  image:
                    type: string
                  version:
                    type: string
                  type:
                    type: string
                    # No enum restriction - supports any framework type
                  config:
                    type: object
                    additionalProperties:
                      type: string
                  args:
                    type: array
                    items:
                      type: string
                  command:
                    type: array
                    items:
                      type: string
                  env:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        value:
                          type: string
              harness:
                type: array
                items:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    optional:
                      type: boolean
              agentConfig:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    configMapRef:
                      type: string
                    secretRef:
                      type: string
                    optional:
                      type: boolean
              sandboxTemplateRef:
                type: string
              replicas:
                type: integer
                default: 1
                minimum: 1
              nodeSelector:
                type: object
                additionalProperties:
                  type: string
              affinity:
                type: object
                properties:
                  nodeAffinity:
                    type: object
                  podAffinity:
                    type: object
                  podAntiAffinity:
                    type: object
              tolerations:
                type: array
                items:
                  type: object
              serviceAccountName:
                type: string
              resources:
                type: object
                properties:
                  limits:
                    type: object
                    additionalProperties:
                      type: string
                  requests:
                    type: object
                    additionalProperties:
                      type: string
              processMode:
                type: string
                enum:
                - shared
                - isolated
                default: isolated
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Creating
                - Running
                - Updating
                - Terminating
                - Failed
              podIPs:
                type: array
                items:
                  type: string
              readyReplicas:
                type: integer
              agentCount:
                type: integer
              agents:
                type: array
                items:
                  type: object
                  required:
                  - name
                  - namespace
                  properties:
                    name:
                      type: string
                    uid:
                      type: string
                    namespace:
                      type: string
                    phase:
                      type: string
                    boundAt:
                      type: string
                      format: date-time
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - type
                  - status
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              frameworkID:
                type: string
              lastAgentSyncTime:
                type: string
                format: date-time
    subresources:
      status: {}