# Config Daemon Deployment for syncing AIAgent configs to hostPath
# This DaemonSet watches AIAgent CRDs and writes AgentConfig to hostPath
# for AgentHandler to read without K8s API calls.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-daemon
  namespace: aiagent-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: config-daemon-clusterrole
rules:
# AIAgent permissions (read-only for watching)
- apiGroups: ["agent.ai"]
  resources: ["aiagents"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["agent.ai"]
  resources: ["aiagents/status"]
  verbs: ["get", "list", "watch"]
# Pod permissions (for discovering runtime pods)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Secret permissions (for reading channel secrets like Discord token)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: config-daemon-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: config-daemon-clusterrole
subjects:
- kind: ServiceAccount
  name: config-daemon
  namespace: aiagent-system

---
# Config Daemon DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: config-daemon
  namespace: aiagent-system
  labels:
    app: config-daemon
    component: config-sync
spec:
  selector:
    matchLabels:
      app: config-daemon
  template:
    metadata:
      labels:
        app: config-daemon
        component: config-sync
    spec:
      serviceAccountName: config-daemon
      containers:
      - name: config-daemon
        image: aiagent/config-daemon:test
        imagePullPolicy: IfNotPresent
        args:
        - --namespace=$(WATCH_NAMESPACE)
        - --configpath=/var/lib/aiagent/configs
        env:
        - name: WATCH_NAMESPACE
          value: ""  # Empty means watch all namespaces
        volumeMounts:
        - name: agent-configs
          mountPath: /var/lib/aiagent/configs
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: agent-configs
        hostPath:
          path: /var/lib/aiagent/configs
          type: DirectoryOrCreate

